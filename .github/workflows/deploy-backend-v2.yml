name: "Deploy Backend → New Account"

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'

jobs:
  security_scan:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          ./gitleaks detect --source . -v
  deploy:
    needs: security_scan
    uses: curatimeXai/github-action/.github/workflows/push-backend-to-ecr-v2.yml@master
    with:
      ecr_repository: healthmap-heartsayings
      cluster_name: healthmap-cluster-prod
      service_name: healthmap-heartsayings-svc-prod
      task_definition_name: healthmap-heartsayings-task-prod
      build_path: ./backend
    permissions:
      id-token: write
      contents: read
