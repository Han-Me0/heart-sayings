<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concepts – Heart sayings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "includes/gdpr_popup.html" %}
<header class="site-header">
    <div class="navbar">
        <div class="navbar-logo">
            <img id="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="logo JGU">
        </div>

        <h2 class="navbar-title">Heart sayings</h2>

        <nav class="navigation">
            <a href="/heart-sayings">Home</a>
            <a href="/heart-sayings/project">Project</a>
            <a href="/heart-sayings/help">Help</a>

            {% if admin_logged_in %}
                <a href="/heart-sayings/admin/logout" class="admin-link">
                    Logout
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
              {% else %}
                <a href="/heart-sayings/admin/login" class="admin-link">
                    Admin
                    <i class="fa-solid fa-right-to-bracket"></i>
                </a>
              {% endif %}
        </nav>
    </div>
    <div class="navbar-red-line"></div>
</header>

<div class="page concepts-page">
  <h1>Concept Overview</h1>
<p class="hint">Select a concept to see idioms across languages.</p>

  <!-- OVERVIEW MODE -->
  <section id="conceptOverview">
    <div class="concepts-center">
      <div id="conceptCards" class="concept-cards"></div>
    </div>
    <a href="/heart-sayings" class="back-home-btn">
      <i class="fa-solid fa-arrow-left"></i>
      Back to home
    </a>
  </section>

  <!-- RESULTS MODE -->
  <div id="conceptResultsView" style="display:none; margin-top:2rem;">

    <h2 id="conceptTitle"></h2>
    <p id="conceptMeta"></p>

    <div class="controls">
        <select id="languageFilter" class="red-select">
            <option value="all">All languages</option>
        </select>

        <input 
            type="text" 
            id="conceptSearch" 
            placeholder="Search within this concept..."
        >
    </div>

    <!-- Grid for idiom cards -->
    <div id="conceptIdiomsGrid" class="idiom-grid"></div>

    <div style="margin-top:20px;">
        <button id="backToListBtn" class="back-home-btn" type="button" style="display:none;">
            <i class="fa-solid fa-arrow-left"></i>
            Back to idioms
        </button>
    </div>

</div>
</div>

<script>
  window.ALL_CONCEPTS = {{ concepts|tojson }};
  window.ALL_IDIOMS = {{ idioms|tojson }};
</script>
<script defer src="{{ url_for('static', filename='concepts.js') }}"></script>


</body>
</html>
