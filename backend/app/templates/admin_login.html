<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../static/img/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Heart sayings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <header class="site-header">
    <div class="navbar">
        <div class="navbar-logo">
            <img id="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="logo JGU">
        </div>

        <h2 class="navbar-title">Heart sayings</h2>

        <nav class="navigation">
            <a href="/heart-sayings">Home</a>
            <a href="/heart-sayings/concepts">Concepts</a>
            <a href="/heart-sayings/project">Project</a>
            <a href="/heart-sayings/help">Help</a>

            {% if admin_logged_in %}
                <a href="/heart-sayings/admin/logout" class="admin-link">Logout</a>
            {% else %}
                <a href="/heart-sayings/admin/login" class="admin-link">Admin</a>
            {% endif %}
        </nav>
    </div>

    <div class="navbar-red-line"></div>
</header>

    <div class="page">
        <div class="suggest-form">
            <h1>Admin Login</h1>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" class="admin-form">
                <div class="form-row">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required>
                </div>

                <div class="form-row">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>
                </div>

                <button type="submit" class="primary-btn">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
