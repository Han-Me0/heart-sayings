<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../static/img/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiom submitted</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header class="site-header">
    <div class="navbar">
        <div class="navbar-logo">
            <img id="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="logo JGU">
        </div>

        <h2 class="navbar-title">Heart sayings</h2>
<button class="hamburger-btn" type="button" aria-label="Toggle navigation">
    <i class="fa-solid fa-bars"></i>
</button>
        <nav class="navigation">
            <a href="/heart-sayings">Home</a>
            <a href="/heart-sayings/concepts">Concepts</a>
            <a href="/heart-sayings/help">Help</a>

            {% if admin_logged_in %}
                <a href="/heart-sayings/admin/logout" class="admin-link">Logout <i class="fa-solid fa-circle-user"></i></a>
            {% else %}
                <a href="/heart-sayings/admin/login" class="admin-link">Admin <i class="fa-solid fa-circle-user"></i></a>
            {% endif %}
        </nav>
    </div>

    <div class="navbar-red-line"></div>
</header>
    <div class="page">
        <div class="success-box">
            <h1>Thank you for your contribution ❤️</h1>
            <p>
                Your idiom suggestion has been submitted and will be reviewed
                before it is added to the collection.
            </p>

            <div class="success-actions">
                <a href="/heart-sayings/suggest" class="suggest-btn-large">
                    ➕ Suggest another idiom
                </a>
            </div>
        </div>
    </div>
    <script>
document.addEventListener("DOMContentLoaded", function () {
    const button = document.querySelector(".hamburger-btn");
    const nav = document.querySelector(".navigation");

    if (!button || !nav) return;

    button.addEventListener("click", function () {
        nav.classList.toggle("is-open");
    });
});
</script>
</body>
</html>
